spring:
  application:
    name: History-template-service
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/nexosalud}
    username: ${SPRING_R2DBC_USERNAME:postgres}
    password: ${SPRING_R2DBC_PASSWORD:postgres}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
    path: /api/v1/form-builder/graphql
server:
  port: ${MODULE_PORT:8080}
management:
  endpoints:
    web:
      exposure:
        include: health,info
